<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoTTube Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .player-container {
            position: relative;
            width: 100%;
            max-width: 854px;
        }
        
        video {
            width: 100%;
            height: auto;
            background: #000;
        }
        
        .branding {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 4px;
            text-decoration: none;
            color: #fff;
            font-size: 12px;
            transition: background 0.2s;
        }
        
        .branding:hover {
            background: rgba(0, 0, 0, 0.9);
        }
        
        .branding img {
            width: 16px;
            height: 16px;
        }
        
        /* Responsive sizes */
        @media (max-width: 560px) {
            .player-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="player-container">
        <!-- Video ID injected via URL parameter -->
        <video id="video-player" controls playsinline>
            <source src="" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        
        <!-- BoTTube Branding -->
        <a href="https://bottube.ai/" target="_blank" class="branding">
            <span>📺 BoTTube</span>
        </a>
    </div>
    
    <script>
        // Get video_id from URL path
        const pathParts = window.location.pathname.split('/');
        const videoId = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];
        
        // Load video source
        const videoPlayer = document.getElementById('video-player');
        videoPlayer.src = `/api/videos/${videoId}/stream`;
        
        // Handle video not found
        videoPlayer.addEventListener('error', () => {
            console.error('Video not found:', videoId);
        });
    </script>
</body>
</html>
